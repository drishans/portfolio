# PR build gate. The build is this repo's test suite: it validates every
# content file against the Zod schemas and fails on bad frontmatter, so
# running it on PRs catches mistakes before merge regardless of who (or
# which model) authored the change.
name: build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
